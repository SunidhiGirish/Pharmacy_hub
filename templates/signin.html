<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign In - Pharmacy Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 text-gray-800 flex flex-col min-h-screen">

  <!-- Header -->
  <header class="flex items-center justify-between px-8 py-4 shadow-md bg-white">
    <div class="flex items-center gap-4">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Pharmacy Logo" class="w-12 h-12" />
      <h1 class="text-2xl font-bold text-green-700">Pharmacy Hub</h1>
    </div>
    <nav class="space-x-6">
      <a href="{{ url_for('index') }}" class="text-gray-600 hover:text-green-700 font-medium">Home</a>
      <a href="{{ url_for('medicines') }}" class="text-gray-600 hover:text-green-700 font-medium">Medicines</a>
      <a href="{{ url_for('cart') }}" class="text-gray-600 hover:text-green-700 font-medium">Cart</a>
      <a href="{{ url_for('orderhistory') }}" class="text-gray-600 hover:text-green-700 font-medium">Order History</a>
      <a href="{{ url_for('feedback') }}" class="text-gray-600 hover:text-green-700 font-medium">Feedback</a>
      {% if 'user_id' not in session %}
        <a href="{{ url_for('signin') }}" class="text-green-700 font-bold">Sign In</a>
        <a href="{{ url_for('signup') }}" class="text-gray-600 hover:text-green-700 font-medium">Sign Up</a>
      {% else %}
        <a href="{{ url_for('logout') }}" class="text-gray-600 hover:text-green-700 font-medium">Logout</a>
      {% endif %}
    </nav>
  </header>

  <!-- Sign In Form -->
  <main class="flex-grow flex items-center justify-center px-4">
    <form action="{{ url_for('signin') }}" method="POST" class="bg-white p-8 rounded-xl shadow-md w-full max-w-md space-y-6">
      <h2 class="text-2xl font-bold text-center text-green-700">Sign In</h2>

      <input type="text" name="username" placeholder="Username" required class="w-full p-2 border rounded" />
      <input type="password" name="password" placeholder="Password" required class="w-full p-2 border rounded" />

      <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Sign In</button>

      <p class="text-sm text-center">Don't have an account?
        <a href="{{ url_for('signup') }}" class="text-green-600 hover:underline">Sign Up</a>
      </p>
    </form>
  </main>

  <!-- Footer -->
  <footer class="bg-green-700 text-white text-center py-4">
    <p>&copy; 2025 Pharmacy Hub. All rights reserved.</p>
  </footer>

</body>
</html>
