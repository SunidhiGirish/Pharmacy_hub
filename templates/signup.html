<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up - Pharmacy Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 text-gray-800 flex flex-col min-h-screen">

  <!-- Header -->
  <header class="flex items-center justify-between px-8 py-4 shadow-md bg-white">
    <div class="flex items-center gap-4">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Pharmacy Logo" class="w-12 h-12" />
      <h1 class="text-2xl font-bold text-green-700">Pharmacy Hub</h1>
    </div>
    <nav class="space-x-6">
      <a href="{{ url_for('index') }}" class="text-gray-600 hover:text-green-700 font-medium">Home</a>
      <a href="{{ url_for('medicines') }}" class="text-gray-600 hover:text-green-700 font-medium">Medicines</a>
      <a href="{{ url_for('cart') }}" class="text-gray-600 hover:text-green-700 font-medium">Cart</a>
      <a href="{{ url_for('orderhistory') }}" class="text-gray-600 hover:text-green-700 font-medium">Order History</a>
      <a href="{{ url_for('feedback') }}" class="text-gray-600 hover:text-green-700 font-medium">Feedback</a>
      {% if 'user_id' not in session %}
        <a href="{{ url_for('signin') }}" class="text-gray-600 hover:text-green-700 font-medium">Sign In</a>
        <a href="{{ url_for('signup') }}" class="text-green-700 font-bold">Sign Up</a>
      {% else %}
        <a href="{{ url_for('logout') }}" class="text-gray-600 hover:text-green-700 font-medium">Logout</a>
      {% endif %}
    </nav>
  </header>

  <!-- Centered Signup Form -->
  <main class="flex-grow flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h2 class="text-2xl font-bold text-center text-green-700 mb-6">Create an Account</h2>

      <form method="POST" action="{{ url_for('signup') }}" class="space-y-4">
        <div>
          <label for="name" class="block text-sm font-medium">Full Name</label>
          <input type="text" name="username" id="name" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:border-green-500" required>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium">Email</label>
          <input type="email" name="email" id="email" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:border-green-500" required>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium">Password</label>
          <input type="password" name="password" id="password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:border-green-500" required>
        </div>

        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">Sign Up</button>
      </form>

      <p class="text-center text-sm mt-4">
        Already have an account?
        <a href="{{ url_for('signin') }}" class="text-green-700 hover:underline">Sign In</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-green-700 text-white text-center py-4">
    <p>&copy; 2025 Pharmacy Hub. All rights reserved.</p>
  </footer>

</body>
</html>
